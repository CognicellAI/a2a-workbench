name: A2A Python interoperability

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  python-v1-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: conformance/interop/python-requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install pinned Python fixture
        run: python -m pip install -r conformance/interop/python-requirements.txt

      - name: Build client package
        run: npm run build:client

      - name: Run cross-language interoperability
        run: npm run interop:python | tee python-interop-report.json

      - name: Publish interoperability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a2a-python-v1-interoperability
          path: python-interop-report.json
